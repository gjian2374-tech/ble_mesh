name: ble_mesh
description: Flutter BLE Mesh plugin for Android/iOS using Nordic nRF Mesh. PB-GATT provisioning, Proxy connections, and group control.
version: 0.0.1
homepage: https://github.com/gjian2374-tech/ble_mesh
repository: https://github.com/gjian2374-tech/ble_mesh
issue_tracker: https://github.com/gjian2374-tech/ble_mesh/issues

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.ble_mesh.ble_mesh
        pluginClass: BleMeshPlugin
      ios:
        pluginClass: BleMeshPlugin
